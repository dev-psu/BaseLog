server:
  port: 8081

spring:
  application:
    name: baseLog
  datasource:
    url: jdbc:mysql://localhost:3306/baselog?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: baselog
  flyway:
    enabled: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: aCSMFzs+81OFPHgwdqdYTH0YAXf2dZJpuHThL51Uzu3aSkaqWvtVg/qZondc/xRb
  access-token-expiry: 1800      # 30분 (초)
  refresh-token-expiry: 604800   # 7일 (초)

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

weather:
  kma:
    service-key: ${KMA_SERVICE_KEY:}
