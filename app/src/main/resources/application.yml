server:
  port: 8081

spring:
  application:
    name: baseLog
  datasource:
    url: jdbc:h2:mem:baselog
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  # dev용 시크릿 — 운영 환경에서는 환경변수로 오버라이드 필요
  secret: aCSMFzs+81OFPHgwdqdYTH0YAXf2dZJpuHThL51Uzu3aSkaqWvtVg/qZondc/xRb
  access-token-expiry: 1800      # 30분 (초)
  refresh-token-expiry: 604800   # 7일 (초)
