server:
  port: 8081

spring:
  application:
    name: baseLog
  datasource:
    url: jdbc:h2:mem:baselog
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  flyway:
    enabled: false        # local 프로파일에서만 활성화 (MySQL 전용)
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: aCSMFzs+81OFPHgwdqdYTH0YAXf2dZJpuHThL51Uzu3aSkaqWvtVg/qZondc/xRb
  access-token-expiry: 1800      # 30분 (초)
  refresh-token-expiry: 604800   # 7일 (초)

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
